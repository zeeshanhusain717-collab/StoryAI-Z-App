name: Zeeshan AI Chat - Native Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android-native:
    runs-on: ubuntu-latest

    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # یہ ایکشن Gradle کو کیش (Cache) کرے گا تاکہ ڈاؤنلوڈنگ کا مسئلہ نہ آئے
    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    - name: Dynamically Create Native Kotlin Project
      run: |
        mkdir -p ZeeshanAIChat/app/src/main/java/com/zeeshan/aichat
        mkdir -p ZeeshanAIChat/app/src/main/res/layout
        mkdir -p ZeeshanAIChat/app/src/main/res/values
        cd ZeeshanAIChat

        # 0. gradle.properties (CRITICAL FIX FOR MEMORY & ANDROIDX)
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        EOF

        # 1. settings.gradle.kts
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "Zeeshan AI Chat"
        include(":app")
        EOF

        # 2. Project build.gradle.kts
        cat << 'EOF' > build.gradle.kts
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath("com.android.tools.build:gradle:8.1.0")
                classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")
            }
        }
        EOF

        # 3. App build.gradle.kts
        cat << 'EOF' > app/build.gradle.kts
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }

        android {
            namespace = "com.zeeshan.aichat"
            compileSdk = 34

            defaultConfig {
                applicationId = "com.zeeshan.aichat"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }

            buildTypes {
                release {
                    isMinifyEnabled = false
                    proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_1_8
                targetCompatibility = JavaVersion.VERSION_1_8
            }
            kotlinOptions {
                jvmTarget = "1.8"
            }
        }

        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("com.google.android.material:material:1.11.0")
            implementation("androidx.constraintlayout:constraintlayout:2.1.4")
        }
        EOF

        # 4. AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.zeeshan.aichat">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.INTERNET" />

            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="Zeeshan AI Chat"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:windowSoftInputMode="adjustResize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 5. UI Layout (activity_main.xml)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:padding="16dp"
            android:background="#F5F5F5">

            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="🤖 Zeeshan AI Chat"
                android:textSize="24sp"
                android:textStyle="bold"
                android:textColor="#333333"
                android:gravity="center"
                android:paddingBottom="16dp" />

            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="horizontal">
                
                <EditText
                    android:id="@+id/inputBox"
                    android:layout_width="0dp"
                    android:layout_height="60dp"
                    android:layout_weight="1"
                    android:hint="Type or speak a topic..."
                    android:background="#FFFFFF"
                    android:padding="10dp"
                    android:textSize="16sp" />

                <ImageButton
                    android:id="@+id/btnMic"
                    android:layout_width="60dp"
                    android:layout_height="60dp"
                    android:src="@android:drawable/ic_btn_speak_now"
                    android:background="#E0E0E0"
                    android:layout_marginStart="8dp" />
            </LinearLayout>

            <Button
                android:id="@+id/btnGenerate"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:text="⚡ Generate Story"
                android:backgroundTint="#007BFF"
                android:textColor="#FFFFFF"
                android:textStyle="bold"
                android:layout_marginTop="12dp" />

            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="horizontal"
                android:layout_marginTop="12dp">
                
                <Button
                    android:id="@+id/btnRead"
                    android:layout_width="0dp"
                    android:layout_height="wrap_content"
                    android:layout_weight="1"
                    android:text="🔊 Read Aloud"
                    android:backgroundTint="#28A745" />

                <Button
                    android:id="@+id/btnStop"
                    android:layout_width="0dp"
                    android:layout_height="wrap_content"
                    android:layout_weight="1"
                    android:text="⏹️ Stop Audio"
                    android:backgroundTint="#DC3545"
                    android:layout_marginStart="8dp" />
            </LinearLayout>

            <ScrollView
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:layout_marginTop="16dp"
                android:background="#FFFFFF"
                android:padding="12dp">
                
                <TextView
                    android:id="@+id/outputText"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="Output will appear here..."
                    android:textSize="18sp"
                    android:textColor="#000000" />
            </ScrollView>
        </LinearLayout>
        EOF

        # 6. Main Logic (MainActivity.kt)
        cat << 'EOF' > app/src/main/java/com/zeeshan/aichat/MainActivity.kt
        package com.zeeshan.aichat

        import android.Manifest
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.os.Bundle
        import android.speech.RecognizerIntent
        import android.speech.tts.TextToSpeech
        import android.widget.Button
        import android.widget.EditText
        import android.widget.ImageButton
        import android.widget.TextView
        import android.widget.Toast
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.app.ActivityCompat
        import androidx.core.content.ContextCompat
        import java.util.*

        class MainActivity : AppCompatActivity(), TextToSpeech.OnInitListener {

            private lateinit var tts: TextToSpeech
            private lateinit var inputBox: EditText
            private lateinit var outputText: TextView
            private val SPEECH_REQUEST_CODE = 100
            private val PERMISSION_REQUEST_CODE = 101

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)

                inputBox = findViewById(R.id.inputBox)
                outputText = findViewById(R.id.outputText)
                val btnMic = findViewById<ImageButton>(R.id.btnMic)
                val btnGenerate = findViewById<Button>(R.id.btnGenerate)
                val btnRead = findViewById<Button>(R.id.btnRead)
                val btnStop = findViewById<Button>(R.id.btnStop)

                checkPermissions()
                tts = TextToSpeech(this, this)

                btnMic.setOnClickListener {
                    startVoiceInput()
                }

                btnGenerate.setOnClickListener {
                    val prompt = inputBox.text.toString().trim()
                    if (prompt.isNotEmpty()) {
                        outputText.text = "AI सोच रहा है..."
                        val story = generateHindiStory(prompt)
                        outputText.text = story
                    } else {
                        Toast.makeText(this, "Please enter a topic!", Toast.LENGTH_SHORT).show()
                    }
                }

                btnRead.setOnClickListener {
                    val textToRead = outputText.text.toString()
                    if (textToRead.isNotEmpty() && textToRead != "Output will appear here...") {
                        tts.speak(textToRead, TextToSpeech.QUEUE_FLUSH, null, "")
                    }
                }

                btnStop.setOnClickListener {
                    if (tts.isSpeaking) {
                        tts.stop()
                    }
                }
            }

            private fun checkPermissions() {
                if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.RECORD_AUDIO), PERMISSION_REQUEST_CODE)
                }
            }

            private fun startVoiceInput() {
                val intent = Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH)
                intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM)
                intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "hi-IN")
                intent.putExtra(RecognizerIntent.EXTRA_PROMPT, "Speak now...")
                
                try {
                    startActivityForResult(intent, SPEECH_REQUEST_CODE)
                } catch (e: Exception) {
                    Toast.makeText(this, "Mic not supported on this device.", Toast.LENGTH_SHORT).show()
                }
            }

            override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                super.onActivityResult(requestCode, resultCode, data)
                if (requestCode == SPEECH_REQUEST_CODE && resultCode == RESULT_OK && data != null) {
                    val result = data.getStringArrayListExtra(RecognizerIntent.EXTRA_RESULTS)
                    inputBox.setText(result?.get(0))
                }
            }

            override fun onInit(status: Int) {
                if (status == TextToSpeech.SUCCESS) {
                    val result = tts.setLanguage(Locale("hi", "IN"))
                    if (result == TextToSpeech.LANG_MISSING_DATA || result == TextToSpeech.LANG_NOT_SUPPORTED) {
                        Toast.makeText(this, "Hindi Voice Data not found!", Toast.LENGTH_SHORT).show()
                    }
                }
            }

            private fun generateHindiStory(prompt: String): String {
                val intros = listOf(
                    "एक समय की बात है, जब दुनिया बहुत अलग थी।",
                    "बहुत पुरानी बात है, ایک रहस्यमयी जगह पर।",
                    "यह कहानी तब की है, जब जादू सच्चाई हुआ करता था।"
                )
                val plots = listOf(
                    "एक दिन, एक अनजान शख्स आया और उसने एक ऐसा राज़ खोला जिसने सब कुछ बदल दिया।",
                    "वहां एक पुरानी किताब मिली, जिसमें भविष्य का हर पन्ना लिखा हुआ था।",
                    "अचानक आसमान में एक अजीब सी रोशनी दिखी, और एक नया सफर शुरू हो गया।"
                )
                val endings = listOf(
                    "अंत में, सच्चाई की जीत हुई और वो हमेशा के लिए इतिहास के पन्नों में अमर हो गए।",
                    "और इस तरह, एक नई शुरुआत हुई, जो हमेशा याद रखी जाएगी।",
                    "उन्होंने साबित कर दिया कि हिम्मत और सच्चाई से कोई भी मुश्किल आसान हो सकती है।"
                )

                val intro = intros.random()
                val plot = plots.random()
                val ending = endings.random()

                return "आपके विषय '$prompt' पर आधारित कहानी:\n\n$intro $plot $ending"
            }

            override fun onDestroy() {
                if (::tts.isInitialized) {
                    tts.stop()
                    tts.shutdown()
                }
                super.onDestroy()
            }
        }
        EOF

    - name: Build APK with Locked Gradle Version
      run: |
        cd ZeeshanAIChat
        # 1. Force exact Gradle version download
        gradle wrapper --gradle-version 8.4
        
        # 2. Give execution permission to gradlew (CRITICAL LINUX FIX)
        chmod +x gradlew
        
        # 3. Build with stacktrace to see any hidden errors
        ./gradlew assembleDebug --stacktrace

    - name: Upload AI Chat APK
      uses: actions/upload-artifact@v4
      with:
        name: Zeeshan-AI-Chat-App
        path: ZeeshanAIChat/app/build/outputs/apk/debug/app-debug.apk
        
