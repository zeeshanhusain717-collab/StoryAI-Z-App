name: Verified Master Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev ccache git libffi-dev lld zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev libgdbm-dev libdb5.3-dev libbz2-dev libexpat1-dev liblzma-dev tk-dev
        pip install --upgrade pip
        pip install "buildozer" "cython<3.0.0" sh

    - name: Accept Android SDK Licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Dynamically Generate App Code & Build Config
      run: |
        # ------------------------------------
        # 1. High-Performance main.py
        # ------------------------------------
        cat << 'EOF' > main.py
        import random
        import threading
        from kivy.app import App
        from kivy.clock import mainthread
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.button import Button
        from kivy.uix.label import Label
        from kivy.uix.scrollview import ScrollView
        from kivy.uix.textinput import TextInput

        class StoryAIApp(App):
            def build(self):
                self.title = "Offline AI Story Generator"
                layout = BoxLayout(orientation='vertical', padding=15, spacing=10)

                title_label = Label(
                    text="🤖 Offline AI Story Generator",
                    font_size="22sp",
                    bold=True,
                    size_hint_y=None,
                    height=50
                )
                layout.add_widget(title_label)

                self.input_box = TextInput(
                    hint_text="कहानी का टॉपिक या शुरुआत लिखें...\n(उदा: Once upon a time, a brave knight)",
                    multiline=True,
                    size_hint_y=None,
                    height=100
                )
                layout.add_widget(self.input_box)

                self.btn = Button(
                    text="⚡ कहानी बनाएँ (Generate Story)",
                    size_hint_y=None,
                    height=55,
                    background_color=(0.1, 0.5, 0.9, 1),
                    bold=True
                )
                self.btn.bind(on_press=self.generate_story_thread)
                layout.add_widget(self.btn)

                scroll = ScrollView()
                self.output_label = Label(
                    text="आपकी जनरेट की गई कहानी यहाँ दिखेगी...",
                    size_hint_y=None,
                    font_size="16sp",
                    halign="left",
                    valign="top"
                )
                self.output_label.bind(texture_size=lambda instance, value: setattr(instance, 'height', value[1]))
                self.output_label.bind(width=lambda instance, value: setattr(instance, 'text_size', (value, None)))
                scroll.add_widget(self.output_label)
                layout.add_widget(scroll)

                return layout

            def generate_story_thread(self, instance):
                self.btn.disabled = True
                self.output_label.text = "🧠 AI कहानी तैयार कर रहा है... कृपया प्रतीक्षा करें।"
                threading.Thread(target=self.run_story_generator).start()

            def run_story_generator(self):
                prompt = self.input_box.text.strip()
                if not prompt:
                    prompt = "In a quiet village hidden behind ancient mountains"

                story = self.craft_story(prompt)
                self.update_output(story)

            def craft_story(self, prompt):
                plots = [
                    "discovered a hidden artifact that radiated an unknown golden light. As they touched it, time seemed to stand still.",
                    "embarked on a journey to unlock the secrets of the ancient forest, facing challenges that tested their courage.",
                    "found a forgotten map leading to an underground city full of wonder and ancient magic.",
                    "encountered a mysterious traveler who handed them an old journal containing prophecies of the future."
                ]
                climax = [
                    "Suddenly, shadows gathered around, requiring a choice between safety and ultimate truth.",
                    "With a burst of determination, they unlocked the final door, revealing a secret that changed everything.",
                    "The path ahead was dangerous, but their resolve was unbreakable as the mystery unraveled."
                ]
                ending = [
                    "In the end, peace returned to the realm, and their legend was written in history books for generations.",
                    "And so, a new chapter began, proving that bravery and hope can overcome any darkness.",
                    "They smiled at the horizon, knowing that their adventure was only just beginning."
                ]

                result = f"📖 **Generated Story**\n\n{prompt} {random.choice(plots)}\n\n{random.choice(climax)}\n\n{random.choice(ending)}"
                return result

            @mainthread
            def update_output(self, text):
                self.output_label.text = text
                self.btn.disabled = False

        if __name__ == '__main__':
            StoryAIApp().run()
        EOF

        # ------------------------------------
        # 2. requirements.txt
        # ------------------------------------
        cat << 'EOF' > requirements.txt
        kivy
        EOF

        # ------------------------------------
        # 3. Optimized buildozer.spec
        # ------------------------------------
        cat << 'EOF' > buildozer.spec
        [app]
        title = StoryAI App
        package.name = storyaiapp
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET
        android.api = 33
        android.minapi = 21
        android.accept_sdk_license = True
        android.private_storage = True
        android.archs = arm64-v8a
        android.sdk_path = /usr/local/lib/android/sdk

        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

    - name: Build APK with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StoryAI-App-APK
        path: bin/*.apk
        
