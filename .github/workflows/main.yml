name: All-in-One Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev ccache git libffi-dev lld zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev libgdbm-dev libdb5.3-dev libbz2-dev libexpat1-dev liblzma-dev tk-dev
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Dynamically Create All App Files (main.py, requirements.txt, buildozer.spec)
      run: |
        # ------------------------------------
        # 1. main.py बनाना
        # ------------------------------------
        cat << 'EOF' > main.py
        import threading
        from kivy.app import App
        from kivy.clock import mainthread
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.button import Button
        from kivy.uix.label import Label
        from kivy.uix.scrollview import ScrollView
        from kivy.uix.textinput import TextInput
        from transformers import pipeline

        class StoryAIApp(App):
            def build(self):
                self.title = "Story AI Generator"
                layout = BoxLayout(orientation='vertical', padding=15, spacing=10)

                title_label = Label(
                    text="Offline AI Story Generator",
                    font_size="20sp",
                    bold=True,
                    size_hint_y=None,
                    height=40
                )
                layout.add_widget(title_label)

                self.input_box = TextInput(
                    hint_text="कहानी की शुरुआत लिखें (उदा: Once upon a time, a rabbit...)",
                    multiline=True,
                    size_hint_y=None,
                    height=100
                )
                layout.add_widget(self.input_box)

                self.btn = Button(
                    text="कहानी बनाएँ (Generate)",
                    size_hint_y=None,
                    height=50,
                    background_color=(0.2, 0.6, 1, 1)
                )
                self.btn.bind(on_press=self.generate_story_thread)
                layout.add_widget(self.btn)

                scroll = ScrollView()
                self.output_label = Label(
                    text="आपकी कहानी यहाँ दिखेगी...",
                    size_hint_y=None,
                    font_size="16sp",
                    halign="left",
                    valign="top"
                )
                self.output_label.bind(texture_size=lambda instance, value: setattr(instance, 'height', value[1]))
                self.output_label.bind(width=lambda instance, value: setattr(instance, 'text_size', (value, None)))
                scroll.add_widget(self.output_label)
                layout.add_widget(scroll)

                return layout

            def generate_story_thread(self, instance):
                self.btn.disabled = True
                self.output_label.text = "AI सोच रहा है... कृपया थोड़ा इंतज़ार करें।"
                threading.Thread(target=self.run_ai_model).start()

            def run_ai_model(self):
                user_text = self.input_box.text.strip()
                if not user_text:
                    user_text = "Once upon a time in a magic forest"
                
                try:
                    generator = pipeline("text-generation", model="sshleifer/tiny-gpt2")
                    result = generator(user_text, max_length=120, num_return_sequences=1, do_sample=True)
                    generated_story = result[0]["generated_text"]
                    self.update_output(generated_story)
                except Exception as e:
                    self.update_output(f"एरर आया: {str(e)}")

            @mainthread
            def update_output(self, text):
                self.output_label.text = text
                self.btn.disabled = False

        if __name__ == '__main__':
            StoryAIApp().run()
        EOF

        # ------------------------------------
        # 2. requirements.txt बनाना
        # ------------------------------------
        cat << 'EOF' > requirements.txt
        kivy
        transformers
        torch
        EOF

        # ------------------------------------
        # 3. buildozer.spec बनाना
        # ------------------------------------
        cat << 'EOF' > buildozer.spec
        [app]
        title = StoryAI App
        package.name = storyaiapp
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy,transformers,torch
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET
        android.api = 31
        android.minapi = 21
        android.ndk = 23b
        android.accept_sdk_license = True
        android.private_storage = True
        android.archs = arm64-v8a

        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

    - name: Pre-accept Android SDK Licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24833b298246567123f4c07b3f9730e42259d10a\n5782f2e3025685035978564f3d2f3d26252d2f12\nd56f5187479451eabf01fb78af6dfcb131a6481e" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build APK with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StoryAI-App-APK
        path: bin/*.apk
        
